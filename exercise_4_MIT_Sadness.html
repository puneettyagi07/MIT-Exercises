      body {
    margin: 0;
    font-family: sans-serif;
    background: #847f7f;
}
#card {
    width: 80%vw;
    max-width: 1200px;
    margin: 50px auto;
    background: #fff;
    border-radius: 20px;
    box-shadow: 10px 5px 8px rgba(0, 0, 0, 0.599);
    overflow: hidden;
}
nav{
    /* height: 15%vh; */
    display: flex;
    justify-content: space-around;
    align-items: center;
    justify-items: center;
    margin: 10px 0px;
}
nav .left,.mid, .right {
    display: flex;
    align-items: center;
}
nav .left img {
    width: 100px;
}
nav .mid input {
    width: 2%vw;
    padding: 10px;
    border: none;
    background-color: #847f7f31;
    color: #847f7f;
    border-radius: 20px;
}
nav .right {
    position: relative;
    left: 100px;
    
}
nav .right svg {
    margin-left: 5px;
    height: 20px;
    width: 20px;
}
main {

}
.main {
    border: 2px solid rgb(237, 215, 14);
   background-color: blueviolet;
   width: 50%vw;
   max-width: 800px;
   height: 70%vh;
    display: grid;
    grid-template-columns: 300px 300px 300px;
    grid-template-rows: 300px 300px 300px;
    gap: 5px;
}
.main h1 {
    grid-column: 2/3;
    grid-row: 2/3;
    justify-items: end;
}
.clips img {
    height: 100px;
    width: 100px;
    grid-column:-2/-3 ;
    grid-row: -3/2;
}
